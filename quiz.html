
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<link rel="stylesheet" href="/assets/quiz.css">

</head>
<body>

<div class="quiz-progress-wrap">
  <div class="container container-quiz">
    <div class="quiz-progress-label">
      <span id="progress-text">0 de 10 respondidas</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
</div>

<header class="quiz-header">
  <div class="container container-quiz">
    <p class="eyebrow">Reino Fungi · Simulado</p>
    <h1>Quiz sobre Fungos<span class="hero-sub">10 questões estilo ENEM/vestibular sobre biologia, ecologia e importância dos fungos.</span></h1>
  </div>
</header>

<main class="container container-quiz" style="padding-top: 2.5rem;">

  <div class="result-panel" id="result-panel">
    <p class="eyebrow" style="justify-content:center; display:flex;">Resultado final</p>
    <div class="result-score"><span id="result-num">0</span><span>/10</span></div>
    <p class="result-msg" id="result-msg"></p>
    <span class="quiz badge-quiz" id="result-badge"></span>
  </div>

  <form id="quiz-form"></form>

  <div class="quiz-actions">
    <button type="button" class="btn-quiz" id="btn-submit" disabled>Corrigir respostas</button>
    <button type="button" class="btn-quiz-ghost" id="btn-reset" style="display:none;">Refazer quiz</button>
  </div>

  <div class="discursive-wrap">
    <p class="eyebrow">Bônus · Questão discursiva (não pontuada)</p>
    <div class="question-card discursive-card">
      <div class="question-meta">
        <span class="q-index" style="background: var(--teal);">B</span>
        <span class="q-tag" id="discursive-tag"></span>
      </div>
      <p class="question-text" id="discursive-text"></p>
      <p class="discursive-sub" id="discursive-a"></p>
      <p class="discursive-sub" id="discursive-b"></p>
      <button type="button" class="btn-quiz-ghost" id="btn-reveal">Mostrar resposta comentada</button>
      <div class="explanation" id="discursive-answer">
        <strong>Resposta comentada</strong>
        <p id="discursive-answer-a" style="margin:0 0 0.75rem;"></p>
        <p id="discursive-answer-b" style="margin:0;"></p>
      </div>
    </div>
  </div>

</main>

<footer class="site-footer">
  <p class="footer-credits">Material de estudo autoral · <span>Reino Fungi</span></p>
</footer>

<script src="/assets/quiz.js"></script>

</body>
</html>
